<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Kanban Board <span id="task-counter" class="badge">0</span></h1>
        <div class="controls">
            <label for="filter-priority">Filter Priority: </label>
            <select>
                <option value="all">All</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button id="btn-clear-done">Clear Done</button> 
        </div>
    </header>

    <main class="board">
        <section id="todo" class="column">
            <h2>To Do</h2>
            <ul class="task-list" id="list-todo"></ul>
            <button class="btn-add" data-column="todo">+ Add Task</button>
        </section>

        <section id="inprogress" class="column">
            <h2>In Progress</h2>
            <ul class="task-list" id="list-inprogress"></ul>
            <button class="btn-add" data-column="inprogress">+ Add Task</button>
        </section>

        <section id="done" class="column">
            <h2>Done</h2>
            <ul class="task-list" id="list-done"></ul>
            <button class="btn-add" data-column="done">+ Add Task</button>
        </section>
    </main>

    <div id="modal-overlay" class="modal-overlay is-hidden">
        <div class="modal">
            <h3 id="modal-title-text">Add New Task</h3>
            <input type="hidden" id="task-id-input">
            <input type="hidden" id="column-id-input">
            
            <label>Title</label>
            <input type="text" id="input-title" placeholder="Task Title">
            
            <label>Description</label>
            <textarea id="input-desc" placeholder="Task details..."></textarea>
            
            <label>Priority</label>
            <select id="input-priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <label>Due Date</label>
            <input type="date" id="input-date">

            <div class="modal-actions">
                <button id="btn-modal-cancel">Cancel</button>
                <button id="btn-modal-save">Save Task</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
